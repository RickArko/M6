name: M6 Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (defaults to current)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [[ "$tag" != "$pkg" ]]; then
            echo "::error::Tag v$tag does not match pyproject version $pkg" >&2
            exit 1
          fi
          echo "Tag v$tag matches pyproject version $pkg"

      - name: Build sdist + wheel
        run: uv build

      - name: Smoke-install wheel
        run: |
          uv venv /tmp/release-venv
          . /tmp/release-venv/bin/activate
          uv pip install dist/m6-*.whl
          python -c "import m6; print('m6 version:', m6.__version__)"
          m6 --help > /dev/null

      - uses: actions/upload-artifact@v7
        with:
          name: m6-dist
          path: dist/*
          retention-days: 30
          if-no-files-found: error

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Build"
            echo "- Ref: \`${{ github.event.inputs.ref || github.ref }}\`"
            echo "- Status: ${{ job.status }}"
            echo "- Artifacts: \`m6-dist\` (30d retention)"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/m6
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: m6-dist
          path: dist/

      - name: Publish via Trusted Publishers
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Publish"
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Status: ${{ job.status }}"
            echo "- PyPI: https://pypi.org/project/m6/"
          } >> "$GITHUB_STEP_SUMMARY"
