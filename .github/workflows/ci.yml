name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Test (fast)
        run: uv run pytest -m "smoke or unit" --no-cov -q

      - name: Build
        run: uv build

      - name: Verify install
        run: uv pip install dist/m6-*.whl --quiet && python -c "import m6; print(m6.__version__)"
