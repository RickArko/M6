name: M6 CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: m6-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Lint & Typecheck"
            echo "- Ruff lint: ${{ job.status }}"
            echo "- Mypy on \`src/m6\`: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Pytest (smoke + unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest --cov --cov-report=term-missing

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Tests"
            echo "- pytest: ${{ job.status }}"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build wheel & verify install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Install wheel in a clean venv
        run: |
          uv venv /tmp/verify-venv
          . /tmp/verify-venv/bin/activate
          # csp-forecaster is a git-only dep via [tool.uv.sources]; the wheel
          # metadata doesn't carry the git override, so provide it explicitly.
          uv pip install "csp-forecaster@git+https://github.com/valeman/csp-forecaster.git"
          uv pip install dist/m6-*.whl
          python -c "import m6; print('m6 version:', m6.__version__)"
          m6 --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: m6-dist-${{ github.sha }}
          path: dist/*
          retention-days: 14
          if-no-files-found: error

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Package Build"
            echo "- \`uv build\`: ${{ job.status }}"
            echo "- Wheel install + import + CLI smoke: ${{ job.status }}"
            echo "- Artifacts uploaded as \`m6-dist-${{ github.sha }}\` (14d retention)"
          } >> "$GITHUB_STEP_SUMMARY"
